name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create version PR or tag release
        uses: changesets/action@v1
        with:
          # the action does not run this through a shell, so compound
          # commands must live in a package script; version-packages also
          # re-runs `bun install` to keep bun.lock in sync with the bumped
          # versions so CI's --frozen-lockfile check passes
          version: bun run version-packages
          publish: bunx changeset tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
